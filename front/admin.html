<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Esports Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body>

    <!-- ═══════════════════════════════════════════════
         LOGIN WALL — shown when not authenticated
    ═══════════════════════════════════════════════ -->
    <div id="loginWall" class="login-wall">
        <div class="login-card">
            <div class="login-logo">
                <span class="login-logo-icon">⚡</span>
                <span class="login-logo-text">ESPORTS ADMIN</span>
            </div>
            <p class="login-subtitle">Sign in to manage content</p>

            <div id="loginError" class="login-error" style="display:none;"></div>

            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button id="loginBtn" class="btn btn-primary btn-full">Sign In</button>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════
         ADMIN APP — shown only when authenticated
    ═══════════════════════════════════════════════ -->
    <div id="adminApp" style="display:none;">
        <header class="admin-header">
            <div class="admin-logo">
                <span>⚡</span> ESPORTS ADMIN
                <a href="/" class="btn btn-outline btn-sm">← View Site</a>
            </div>
            <div class="admin-user">
                <span id="adminUserEmail" class="admin-user-email"></span>
                <button id="logoutBtn" class="btn btn-outline btn-sm">Sign Out</button>
            </div>
        </header>

        <div class="admin-container">
            <div class="tabs" id="tabs"></div>
            <div class="toolbar">
                <h2 id="tableTitle"></h2>
                <button class="btn btn-primary" id="addBtn">+ Add New</button>
            </div>
            <div class="table-wrapper">
                <div id="tableContainer"></div>
            </div>
        </div>
    </div>

    <div id="modalContainer"></div>
    <div id="toastContainer"></div>

    <script src="./env.js"></script>
    <script type="module" src="./js/admin.js"></script>
</body>
</html>
